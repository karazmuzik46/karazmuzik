<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaz Müzik | Resmi Web Sitesi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        header { text-align: center; padding: 50px 0; border-bottom: 2px solid #ff0000; }
        h1 { color: #ff0000; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; }
        
        .section { background: #111; padding: 20px; margin-top: 20px; border-radius: 10px; border-left: 5px solid #ff0000; }
        .announcement { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 5px; border-bottom: 1px solid #333; }
        .announcement small { color: #ff0000; font-weight: bold; }

        /* Admin Paneli ve Giriş Kutusu */
        #loginContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border: 2px solid #ff0000; z-index:9999; width: 300px; border-radius: 15px; box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        #adminPanel { display: none; background: #111; border: 2px dashed #ff0000; padding: 20px; margin-top: 20px; border-radius: 10px; }
        
        input, textarea, button { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        input, textarea { background: #222; color: white; border: 1px solid #444; }
        button { background: #ff0000; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b30000; }

        .adm-trigger { text-align: right; padding: 40px 10px 10px; color: #222; cursor: pointer; font-size: 10px; user-select: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>KARAZ MÜZİK</h1>
        <p>Bağımsız Müzik Prodüksiyonu & Vizyon</p>
    </header>

    <div class="section">
        <h2>👤 Biz Kimiz?</h2>
        <p>Karaz Müzik, özgün ritimler ve sert altyapılarla müzik dünyasında kendi yolunu çizen bağımsız bir oluşumdur. Burası bir label'dan fazlası; bir vizyondur.</p>
    </div>

    <div class="section">
        <h2>📢 Son Duyurular</h2>
        <div id="announcementsList">ÇOK YAKINDA</div>
    </div>

    <div id="adminPanel">
        <h3 style="color:#ff0000; margin-top:0;">🛠️ Yönetici Paneli</h3>
        <textarea id="postText" placeholder="Yeni bir şey duyur kanka..."></textarea>
        <button onclick="sharePost()">YAYINLA</button>
        <button onclick="firebase.auth().signOut().then(() => location.reload())" style="background:#444;">ÇIKIŞ YAP</button>
    </div>

    <div class="adm-trigger" onclick="document.getElementById('loginContainer').style.display='block'">ADM</div>
</div>

<div id="loginContainer">
    <h3 style="color:#ff0000; text-align:center;">PANEL GİRİŞİ</h3>
    <input type="email" id="adminEmail" placeholder="E-posta">
    <input type="password" id="adminPassword" placeholder="Şifre">
    <button onclick="adminLogin()">GİRİŞ YAP</button>
    <button onclick="document.getElementById('loginContainer').style.display='none'" style="background:transparent; color:#888;">Kapat</button>
</div>

<script>
    // --- 1. AYARLAR: BURAYA KENDİ FİREBASE KODLARINI YAPIŞTIR ---
   const firebaseConfig = {
  apiKey: "AIzaSyBtsTPwhmW9gpVwGN9reT1sF0EepGAAgRQ",
  authDomain: "karaz-muzik.firebaseapp.com",
  projectId: "karaz-muzik",
  storageBucket: "karaz-muzik.firebasestorage.app",
  messagingSenderId: "885830398892",
  appId: "1:885830398892:web:6bb65915a687b879070009",
  measurementId: "G-2NEC0JJZYX"
};
    // Firebase Başlat
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 2. DUYURULARI ÇEKME ---
    db.collection("posts").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById("announcementsList");
        list.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : "Şimdi";
            list.innerHTML += `
                <div class="announcement">
                    <small>${date}</small>
                    <p>${data.content}</p>
                </div>
            `;
        });
    });

    // --- 3. ADMİN GİRİŞİ ---
    function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;

        firebase.auth().signInWithEmailAndPassword(email, password)
            .then(() => {
                alert("Hoş geldin patron!");
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            })
            .catch((error) => alert("Hata: " + error.message));
    }

    // --- 4. PAYLAŞIM YAPMA ---
    function sharePost() {
        const content = document.getElementById("postText").value;
        if (!content) return alert("Boş bırakma kanka!");

        db.collection("posts").add({
            content: content,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById("postText").value = "";
            alert("Yayınlandı!");
        }).catch(err => alert("Hata: " + err.message));
    }
</script>

</body>
</html>
